name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_LLM_ENDPOINT: ${{ vars.VITE_LLM_ENDPOINT }}
        run: npm run build

      - name: Publish gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          git worktree add ../gh-pages gh-pages || git worktree add --detach ../gh-pages
          find ../gh-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a dist/. ../gh-pages/
          touch ../gh-pages/.nojekyll
          cd ../gh-pages
          git add -A
          git commit -m "Deploy GitHub Pages" || echo "No changes to deploy"
          git push origin HEAD:gh-pages
